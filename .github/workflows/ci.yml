jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build parent POM
        run: |
          cd beneficio-system
          mvn clean install -B

      - name: Build EJB Module
        run: |
          cd ejb-module
          mvn clean install -B

      - name: Build Backend Module
        run: |
          cd backend-module
          mvn clean package -B
