name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and install EJB Module
        run: |
          cd ejb-module
          mvn clean install -B
      - name: Build backend
        run: |
          cd backend-module
          mvn clean package -B
