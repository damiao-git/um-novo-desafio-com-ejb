<h2 mat-dialog-title>Transferir Valor</h2>

<mat-dialog-content>
  <div class="transfer-info">
    <p><strong>De:</strong> {{ data.beneficioDe.nome }}</p>
    <p><strong>Saldo Disponível:</strong> {{ saldoDisponivel | currency:'BRL':'symbol':'1.2-2' }}</p>
  </div>

  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Transferir Para</mat-label>
      <mat-select formControlName="destinoId">
        <mat-option *ngFor="let beneficio of beneficiosDisponiveis" [value]="beneficio.id">
          {{ beneficio.nome }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('destinoId')!.hasError('required')">
        Selecione um beneficiário
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Valor (R$)</mat-label>
      <input matInput type="number" formControlName="valor" min="0" step="0.01" placeholder="0.00">
      <mat-error *ngIf="form.get('valor')!.hasError('required')">
        Valor é obrigatório
      </mat-error>
      <mat-error *ngIf="form.get('valor')!.hasError('min')">
        Valor deve ser maior que zero
      </mat-error>
      <mat-error *ngIf="form.get('valor')!.hasError('insufficient')">
        Saldo insuficiente
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="transferir()" [disabled]="form.invalid">
    <mat-icon>send</mat-icon>
    Transferir
  </button>
</mat-dialog-actions>
