<div class="notification-modal" [ngClass]="'notification-' + data.type">
  <div class="notification-header">
    <mat-icon class="notification-icon" [ngClass]="'icon-' + data.type">
      {{ getIcon() }}
    </mat-icon>
    <h2 mat-dialog-title>{{ data.title }}</h2>
  </div>

  <mat-dialog-content class="notification-content">
    <p>{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-raised-button [color]="data.type === 'success' ? 'primary' : 'warn'" mat-dialog-close>
      Fechar
    </button>
  </mat-dialog-actions>
</div>
